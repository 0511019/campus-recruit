name: 每日抓取招聘数据

on:
  schedule:
    - cron: '0 2 * * *'     # 每天北京时间10:00（UTC 2:00）
  workflow_dispatch:          # 允许手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r scraper/requirements.txt

      - name: 运行爬虫
        run: python scraper/scraper.py

      - name: 提交更新
        run: |
          git config user.name "校招瞭望台机器人"
          git config user.email "bot@campus-recruit.cn"
          git add data.json
          git diff --staged --quiet || git commit -m "🤖 自动更新招聘数据 $(date +'%Y-%m-%d')"
          git push
